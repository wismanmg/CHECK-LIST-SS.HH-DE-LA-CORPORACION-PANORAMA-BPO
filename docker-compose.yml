services:
  checklist:
    build: .
    container_name: checklist-sshh
    ports:
      - "8740:8740"
    volumes:
      # La carpeta actual (con el Excel de respuestas) se monta como /datos.
      # Así el contenedor usa tu base de datos real y nada se pierde al actualizar.
      - ./:/datos
    environment:
      # Cambia las claves aquí para no dejarlas en el código
      - CLAVE_ADMIN=FMI2026
      - CLAVE_EDITOR=FME2026
      # Para usar Supabase en lugar del Excel local, descomenta y completa:
      # - SUPABASE_URL=https://TU-PROYECTO.supabase.co
      # - SUPABASE_KEY=clave-service_role
      # - ZONA_HORARIA=-5
    restart: unless-stopped
